name: Stream Pack

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check generator syntax
        run: npm run check

      - name: Check overlay scripts
        run: echo "Covered by npm run check"

      - name: Generate stream pack
        run: |
          node tools/generate-stream-pack.mjs
          npm run monetize
          npm run schedule
          npm run shorts

      - name: Verify generated files are committed
        run: |
          git diff --exit-code -- outputs/generated-stream-pack/streams.json outputs/generated-stream-pack/streams.md outputs/generated-stream-pack/streams.csv
          git diff --exit-code -- outputs/monetization-kit/monetization-kit.json outputs/monetization-kit/monetization-kit.md
          git diff --exit-code -- outputs/schedule/live-calendar.ics outputs/schedule/live-schedule.md outputs/schedule/live-schedule.json
          git diff --exit-code -- outputs/shorts-kit/shorts-kit.json outputs/shorts-kit/shorts-kit.md

      - name: Preflight
        run: npm run preflight
