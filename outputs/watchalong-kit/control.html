<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Watchalong Producer Control</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0b1020;
        color: #f8fafc;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        background:
          linear-gradient(135deg, #0b1020, #121a2f 62%, #0b1020),
          repeating-linear-gradient(135deg, rgba(255,255,255,.05) 0 1px, transparent 1px 18px);
      }

      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 28px;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 22px;
      }

      h1 {
        margin: 0;
        font-size: 34px;
        line-height: 1;
      }

      .status {
        color: #21d4a3;
        font-weight: 900;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 16px;
      }

      section {
        grid-column: span 4;
        padding: 18px;
        border: 1px solid rgba(255,255,255,.14);
        background: rgba(255,255,255,.06);
      }

      section.wide { grid-column: span 8; }
      section.full { grid-column: 1 / -1; }

      h2 {
        margin: 0 0 14px;
        font-size: 16px;
        color: #ffbf3f;
      }

      label {
        display: grid;
        gap: 6px;
        margin: 12px 0;
        color: #b7c2d9;
        font-size: 13px;
        font-weight: 800;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid rgba(255,255,255,.16);
        background: rgba(0,0,0,.3);
        color: white;
        padding: 10px 11px;
        font: inherit;
      }

      textarea {
        min-height: 76px;
        resize: vertical;
      }

      .row {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      button {
        min-height: 40px;
        border: 1px solid rgba(255,255,255,.18);
        background: #17213a;
        color: white;
        padding: 0 14px;
        font-weight: 900;
        cursor: pointer;
      }

      button.primary { background: #21a981; }
      button.danger { background: #c43750; }
      button.gold { background: #b98219; }

      .score {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 12px;
        align-items: center;
        text-align: center;
      }

      .score strong {
        font-size: 64px;
        line-height: 1;
      }

      @media (max-width: 900px) {
        section,
        section.wide { grid-column: 1 / -1; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Producer Control</h1>
          <p class="status">Live-linked to overlay on this browser profile</p>
        </div>
        <button class="danger" id="reset-all">Reset All</button>
      </header>

      <div class="grid">
        <section class="full">
          <h2>Match Switcher</h2>
          <label>Current Match
            <select id="presetId"></select>
          </label>
          <div class="buttons">
            <button class="primary" id="load-preset">Load Match + Reset Score</button>
            <button id="copy-title">Copy YouTube Title</button>
          </div>
          <p id="kickoff" style="color:#b7c2d9;font-weight:800;margin:12px 0 0"></p>
        </section>

        <section>
          <h2>Score</h2>
          <div class="score">
            <div>
              <strong id="home-score">0</strong>
              <div>BRA</div>
            </div>
            <div>vs</div>
            <div>
              <strong id="away-score">0</strong>
              <div>MAR</div>
            </div>
          </div>
          <div class="buttons">
            <button class="primary" data-score="home">BRA Goal</button>
            <button class="primary" data-score="away">MAR Goal</button>
            <button data-score="minusHome">BRA -1</button>
            <button data-score="minusAway">MAR -1</button>
          </div>
        </section>

        <section>
          <h2>Clock</h2>
          <label>Minute
            <input id="minutes" type="number" min="0" max="130" value="0">
          </label>
          <div class="buttons">
            <button data-min="-1">-1 min</button>
            <button data-min="1">+1 min</button>
            <button data-min="15">+15 min</button>
            <button data-min="45">45 min</button>
            <button data-min="90">90 min</button>
          </div>
        </section>

        <section>
          <h2>Hype</h2>
          <label>Hype %
            <input id="hype" type="range" min="0" max="100" value="72">
          </label>
          <div class="buttons">
            <button class="gold" data-hype="100">Big Chance</button>
            <button class="gold" data-hype="85">VAR Drama</button>
            <button data-hype="55">Calm</button>
          </div>
        </section>

        <section>
          <h2>Auto Voice</h2>
          <div class="buttons">
            <button class="primary" id="speak-line">Speak Update</button>
            <button id="speak-goal">Goal Line</button>
            <button id="speak-hype">Hype Line</button>
            <button id="voice-note">Copy Disclaimer</button>
          </div>
          <label>Custom English Line
            <textarea id="customLine">Welcome to Kickoff Room Live. This is a no-footage watchalong.</textarea>
          </label>
        </section>

        <section class="wide">
          <h2>Live Story</h2>
          <label>Talking Point
            <textarea id="topic"></textarea>
          </label>
          <label>Game Pulse
            <textarea id="gamePulse"></textarea>
          </label>
        </section>

        <section>
          <h2>Viewer Hook</h2>
          <label>Chat Mission
            <textarea id="chatMission"></textarea>
          </label>
          <label>Key Battle
            <input id="keyBattle" type="text">
          </label>
        </section>

        <section class="full">
          <h2>Match Stats</h2>
          <div class="row">
            <label>BRA Momentum
              <input id="momentumHome" type="range" min="0" max="100">
            </label>
            <label>MAR Momentum
              <input id="momentumAway" type="range" min="0" max="100">
            </label>
          </div>
          <div class="row">
            <label>BRA Shots
              <input id="shotsHome" type="number" min="0">
            </label>
            <label>MAR Shots
              <input id="shotsAway" type="number" min="0">
            </label>
          </div>
          <div class="row">
            <label>FRA Possession
              <input id="possessionHome" type="number" min="0" max="100">
            </label>
            <label>SEN Possession
              <input id="possessionAway" type="number" min="0" max="100">
            </label>
          </div>
        </section>
      </div>
    </main>

    <script src="match-presets.js"></script>
    <script>
      const key = "watchalong-live-state";
      const channel = "BroadcastChannel" in window ? new BroadcastChannel("watchalong-control") : null;
      const presets = window.MATCH_PRESETS || [];
      const defaults = {
        presetId: "fra-sen",
        home: "FRANCE",
        away: "SENEGAL",
        homeShort: "FRA",
        awayShort: "SEN",
        homeColor: "#1d3f8f",
        awayColor: "#00853f",
        homeScore: 0,
        awayScore: 0,
        seconds: 0,
        hype: 72,
        topic: "France's attacking depth, Senegal's physical edge, opening-night pressure",
        keyBattle: "France's wide rotations vs Senegal's aggressive full-back duels",
        gamePulse: "France can stretch the pitch quickly; Senegal need compact defending and fast counters",
        chatMission: "Type your country + final score prediction",
        momentumHome: 58,
        momentumAway: 42,
        shotsHome: 0,
        shotsAway: 0,
        possessionHome: 50,
        possessionAway: 50
      };
      let state = { ...defaults, ...JSON.parse(localStorage.getItem(key) || "{}") };
      const ids = ["topic", "gamePulse", "chatMission", "keyBattle", "momentumHome", "momentumAway", "shotsHome", "shotsAway", "possessionHome", "possessionAway", "hype"];

      function el(id) { return document.getElementById(id); }
      function preset() { return presets.find((item) => item.id === state.presetId) || presets[0]; }

      function publish() {
        state.presetId = el("presetId").value;
        state.seconds = Number(el("minutes").value || 0) * 60;
        ids.forEach((id) => {
          const value = el(id).type === "number" || el(id).type === "range" ? Number(el(id).value) : el(id).value;
          state[id] = value;
        });
        localStorage.setItem(key, JSON.stringify(state));
        channel?.postMessage(state);
        render();
      }

      function render() {
        el("home-score").textContent = state.homeScore;
        el("away-score").textContent = state.awayScore;
        el("presetId").value = state.presetId;
        const current = preset();
        el("kickoff").textContent = current ? `${current.home} vs ${current.away} - ${current.kickoffIst}` : "";
        el("minutes").value = Math.floor(state.seconds / 60);
        ids.forEach((id) => { el(id).value = state[id]; });
      }

      function loadPreset(id) {
        const next = presets.find((item) => item.id === id);
        if (!next) return;
        state = {
          ...state,
          ...next,
          presetId: id,
          homeScore: 0,
          awayScore: 0,
          seconds: 0,
          hype: 55,
          momentumHome: 50,
          momentumAway: 50,
          shotsHome: 0,
          shotsAway: 0,
          possessionHome: 50,
          possessionAway: 50
        };
        publish();
      }

      function titleForCurrent() {
        const current = preset();
        return `${current.home} vs ${current.away} LIVE WATCHALONG | World Cup 2026 | English Reactions | No Footage`;
      }

      function speak(line) {
        const payload = { ...state, speakLine: line, speakNonce: Date.now() };
        localStorage.setItem(key, JSON.stringify(payload));
        channel?.postMessage(payload);
      }

      presets.forEach((item) => {
        const option = document.createElement("option");
        option.value = item.id;
        option.textContent = `${item.home} vs ${item.away} - ${item.kickoffIst}`;
        el("presetId").append(option);
      });

      document.addEventListener("input", (event) => {
        if (event.target.matches("input, textarea")) publish();
      });

      document.addEventListener("click", (event) => {
        const score = event.target.dataset.score;
        const min = event.target.dataset.min;
        const hype = event.target.dataset.hype;
        if (score === "home") state.homeScore += 1;
        if (score === "away") state.awayScore += 1;
        if (score === "minusHome") state.homeScore = Math.max(0, state.homeScore - 1);
        if (score === "minusAway") state.awayScore = Math.max(0, state.awayScore - 1);
        if (min) el("minutes").value = Number(min) > 10 ? Number(min) : Number(el("minutes").value) + Number(min);
        if (hype) state.hype = Number(hype);
        if (event.target.id === "load-preset") loadPreset(el("presetId").value);
        if (event.target.id === "copy-title") navigator.clipboard?.writeText(titleForCurrent());
        if (event.target.id === "speak-line") speak(el("customLine").value);
        if (event.target.id === "speak-goal") speak("Goal. Huge moment in this match. The score has changed.");
        if (event.target.id === "speak-hype") speak("The pressure is rising. This is the moment where the match can turn.");
        if (event.target.id === "voice-note") navigator.clipboard?.writeText("No match footage or broadcast audio here. Open the official broadcast and sync with our timer.");
        if (event.target.id === "reset-all") state = { ...defaults };
        publish();
      });

      channel?.addEventListener("message", (event) => {
        state = { ...state, ...event.data };
        render();
      });

      render();
      publish();
    </script>
  </body>
</html>
