<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Watchalong Thumbnail</title>
    <style>
      body {
        margin: 0;
        width: 1280px;
        height: 720px;
        overflow: hidden;
        font-family: Inter, Arial, sans-serif;
        color: white;
        background:
          linear-gradient(115deg, rgba(5, 10, 24, 0.98), rgba(14, 20, 38, 0.76)),
          repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.06) 0 2px, transparent 2px 22px),
          radial-gradient(circle at 23% 34%, rgba(33, 212, 163, 0.26), transparent 32%),
          radial-gradient(circle at 82% 20%, rgba(255, 191, 63, 0.22), transparent 34%);
      }

      .wrap {
        position: relative;
        width: 1280px;
        height: 720px;
        padding: 62px;
      }

      .badge {
        display: inline-grid;
        place-items: center;
        height: 58px;
        padding: 0 22px;
        background: #ff455f;
        font-size: 30px;
        font-weight: 950;
      }

      h1 {
        margin: 36px 0 0;
        max-width: 880px;
        font-size: 106px;
        line-height: 0.92;
        letter-spacing: 0;
      }

      .teams {
        position: absolute;
        left: 62px;
        bottom: 78px;
        display: grid;
        gap: 14px;
        font-size: 52px;
        font-weight: 950;
      }

      .teams span {
        display: inline-flex;
        align-items: center;
        gap: 18px;
      }

      .swatch {
        width: 30px;
        height: 58px;
        display: inline-block;
      }

      .right {
        position: absolute;
        right: 62px;
        top: 92px;
        width: 270px;
        height: 500px;
        border: 3px solid rgba(255,255,255,0.18);
        display: grid;
        place-items: center;
        text-align: center;
        background: rgba(255,255,255,0.06);
      }

      .right strong {
        font-size: 34px;
        line-height: 1.1;
      }

      .note {
        position: absolute;
        right: 62px;
        bottom: 62px;
        color: #21d4a3;
        font-size: 28px;
        font-weight: 950;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="badge">LIVE</div>
      <h1>WORLD CUP WATCHALONG</h1>
      <div class="teams">
        <span><i class="swatch" style="background:#d52b1e"></i>SWITZERLAND</span>
        <span><i class="swatch" style="background:#002f6c"></i>BOSNIA &amp; HERZEGOVINA</span>
      </div>
      <div class="right">
        <strong>ENGLISH<br>REACTIONS<br>+ CHAT</strong>
      </div>
      <div class="note">NO FOOTAGE</div>
    </div>
  </body>
</html>
