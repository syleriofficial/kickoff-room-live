<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Live Readiness Checklist</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #08111f;
        color: #f8fafc;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        background:
          linear-gradient(135deg, #08111f, #14223b 56%, #08111f),
          repeating-linear-gradient(135deg, rgba(255,255,255,.055) 0 1px, transparent 1px 20px);
      }

      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 28px;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0;
        font-size: 38px;
        line-height: 1;
      }

      .status {
        min-height: 42px;
        display: grid;
        place-items: center;
        padding: 0 14px;
        background: #17213a;
        color: #21d4a3;
        font-weight: 950;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 16px;
      }

      section {
        grid-column: span 6;
        padding: 18px;
        border: 1px solid rgba(255,255,255,.14);
        background: rgba(255,255,255,.06);
      }

      h2 {
        margin: 0 0 14px;
        color: #ffbf3f;
        font-size: 16px;
      }

      label {
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 42px;
        border-bottom: 1px solid rgba(255,255,255,.08);
        font-size: 16px;
        font-weight: 760;
      }

      input {
        width: 18px;
        height: 18px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 18px;
      }

      button,
      a {
        min-height: 40px;
        display: inline-grid;
        place-items: center;
        border: 1px solid rgba(255,255,255,.18);
        background: #17213a;
        color: white;
        padding: 0 14px;
        font: inherit;
        font-weight: 900;
        text-decoration: none;
        cursor: pointer;
      }

      button.primary,
      a.primary { background: #21a981; }

      @media (max-width: 850px) {
        section { grid-column: 1 / -1; }
        header {
          align-items: start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Live Readiness</h1>
          <p>Use this before every no-footage watchalong.</p>
        </div>
        <div class="status" id="status">0% READY</div>
      </header>

      <div class="grid" id="checks">
        <section>
          <h2>YouTube</h2>
          <label><input type="checkbox"> Live verification active</label>
          <label><input type="checkbox"> Private scheduled live created</label>
          <label><input type="checkbox"> Title includes No Footage</label>
          <label><input type="checkbox"> Description includes disclaimer</label>
          <label><input type="checkbox"> Pinned chat copied</label>
        </section>

        <section>
          <h2>OBS</h2>
          <label><input type="checkbox"> OBS canvas set to 1920 x 1080</label>
          <label><input type="checkbox"> Browser source uses /overlay</label>
          <label><input type="checkbox"> Browser source audio enabled for TTS</label>
          <label><input type="checkbox"> Mic/camera disabled if faceless</label>
          <label><input type="checkbox"> Test recording checked</label>
        </section>

        <section>
          <h2>Overlay</h2>
          <label><input type="checkbox"> Correct match preset loaded</label>
          <label><input type="checkbox"> Score reset to 0-0</label>
          <label><input type="checkbox"> Timer reset to 00:00</label>
          <label><input type="checkbox"> Auto voice tested</label>
          <label><input type="checkbox"> Chat mission visible</label>
        </section>

        <section>
          <h2>Growth</h2>
          <label><input type="checkbox"> Shorts ideas ready</label>
          <label><input type="checkbox"> Telegram reminder ready</label>
          <label><input type="checkbox"> Sponsor/affiliate block ready</label>
          <label><input type="checkbox"> First-minute script ready</label>
          <label><input type="checkbox"> Post-match Shorts plan ready</label>
        </section>
      </div>

      <div class="actions">
        <a class="primary" href="dashboard.html">Command Center</a>
        <a href="control.html">Producer Panel</a>
        <a href="overlay.html">Overlay</a>
        <button id="reset">Reset Checks</button>
      </div>
    </main>

    <script>
      const key = "kickoff-readiness-checks";
      const checks = [...document.querySelectorAll("input[type='checkbox']")];
      const status = document.getElementById("status");
      const saved = JSON.parse(localStorage.getItem(key) || "[]");

      checks.forEach((check, index) => {
        check.checked = Boolean(saved[index]);
        check.addEventListener("change", render);
      });

      function render() {
        const values = checks.map((check) => check.checked);
        localStorage.setItem(key, JSON.stringify(values));
        const done = values.filter(Boolean).length;
        const pct = Math.round((done / checks.length) * 100);
        status.textContent = `${pct}% READY`;
        status.style.background = pct === 100 ? "#21a981" : "#17213a";
      }

      document.getElementById("reset").addEventListener("click", () => {
        checks.forEach((check) => { check.checked = false; });
        render();
      });

      render();
    </script>
  </body>
</html>
